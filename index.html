<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pawan Kamat | Loading</title>
    <link rel="shortcut icon" href="images/pa1..png" type="image/x-icon">
    <link rel="stylesheet" href="loader.css">
</head>
<body>
    <div id="loading-screen">
        <div id="logo">

        </div>
        
        <div class="counter">
            <div class="digit hundred">
                <div class="number" id="hundreds">
                    <span>0</span>
                    <span>1</span>
                </div>
            </div>
            <div class="digit ten">
                <div class="number" id="tens">
                    <span>0</span>
                    <span>1</span>
                    <span>2</span>
                    <span>3</span>
                    <span>4</span>
                    <span>5</span>
                    <span>6</span>
                    <span>7</span>
                    <span>8</span>
                    <span>9</span>
                </div>
            </div>
            <div class="digit unit">
                <div class="number" id="units">
                    <span>0</span>
                    <span>1</span>
                    <span>2</span>
                    <span>3</span>
                    <span>4</span>
                    <span>5</span>
                    <span>6</span>
                    <span>7</span>
                    <span>8</span>
                    <span>9</span>
                </div>
            </div>
        </div>
        
        <p>Loading...</p>
    </div>

    <script src="script/loader.js"></script>
</body>
</html>
