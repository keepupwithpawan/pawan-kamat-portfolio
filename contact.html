<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pawan Kamat | Contact</title>
    <link rel="shortcut icon" href="/images/pa1..png" type="image/x-icon">
    <link rel="stylesheet" href="contact.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.10.4/gsap.min.js"></script>
</head>
<body>
    <div id="cursor" class="Cursor"></div>

    <div id="nav-container">
        <div id="nav-bar">
            <div id="name">
                <p>pa1.</p>
            </div>

            <div id="ul-container">
                <ul>
                    <li id="projects">Work</li>
                    <li id="about">About</li>
                    <li id="resume">Resume</li>
                </ul>
            </div>
        </div>
    </div>

    <div id="main-container">
        <div id="contact-container">
            <div id="left">
                <h2>Contact Me</h2>
                <input type="text" placeholder="Your Name *" id="name-input">
                <input type="email" placeholder="Your Email *" id="email-input">
                <textarea placeholder="Your Message *" id="message-textarea"></textarea>
                <button class="send-button">Send it</button>
            </div>
            <div id="right">

            </div>
        </div>
    </div>

    <div id="footer-container">
        <div id="footer-item-left">
            <p>2024 &copy; Pawan Kamat</p>
            <p id="developed-by">Developed with sass by <span>pa1.</span></p>
        </div>
        <div id="footer-item-right">
            <ul>
                <li id="linkedin">LinkedIn</li>
                <li id="twitter">Twitter</li>
                <li id="whatsapp">WhatsApp</li>
            </ul>
        </div>
    </div>

<script src="script/contact.js"></script>

</body>
</html>
